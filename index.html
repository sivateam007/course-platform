<script>
    const API_URL = 'http://localhost:3000/api';
    
    // Tab switching (keep your existing)
    document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            const tabId = this.getAttribute('data-tab');
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            document.getElementById(tabId + 'Form').classList.add('active');
            document.getElementById('message').style.display = 'none';
            document.getElementById('verificationMessage').classList.remove('show');
        });
    });
    
    // Password strength checker
    document.getElementById('signupPassword')?.addEventListener('input', function(e) {
        const password = e.target.value;
        const strengthBar = document.getElementById('strengthBar');
        let score = 0;
        if (password.length >= 8) score++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[^A-Za-z0-9]/.test(password)) score++;
        strengthBar.className = 'strength-bar';
        if (score === 1) strengthBar.className = 'strength-bar weak';
        else if (score === 2) strengthBar.className = 'strength-bar medium';
        else if (score >= 3) strengthBar.className = 'strength-bar strong';
        if (password.length === 0) strengthBar.style.width = '0%';
    });
    
    function showMessage(msg, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.textContent = msg;
        msgDiv.className = `message ${type}`;
        msgDiv.style.display = 'block';
        if (type === 'success') setTimeout(() => msgDiv.style.display = 'none', 5000);
    }
    
    // Signup
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = prompt("Enter your full name:");
        if (!name) return;
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        const terms = document.getElementById('terms').checked;
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showMessage('Invalid email', 'error');
        if (password.length < 6) return showMessage('Password min 6 chars', 'error');
        if (password !== confirm) return showMessage('Passwords do not match', 'error');
        if (!terms) return showMessage('Accept terms', 'error');
        
        const btn = document.getElementById('signupBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
        
        try {
            const res = await fetch(`${API_URL}/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showMessage('Account created! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'home.html', 1500);
            } else {
                showMessage(data.error || 'Signup failed', 'error');
            }
        } catch (err) { showMessage('Server error', 'error'); }
        finally { btn.disabled = false; btn.innerHTML = 'Create Account'; }
    });
    
    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showMessage('Invalid email', 'error');
        
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
        
        try {
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showMessage('Login successful!', 'success');
                setTimeout(() => window.location.href = 'home.html', 1000);
            } else {
                showMessage(data.error || 'Login failed', 'error');
            }
        } catch (err) { showMessage('Server error', 'error'); }
        finally { btn.disabled = false; btn.innerHTML = 'Login to Account'; }
    });
    
    // Forgot password
    document.getElementById('forgotPassword')?.addEventListener('click', (e) => {
        e.preventDefault();
        showMessage('Password reset not implemented. Contact support.', 'warning');
    });
    
    // Load remembered email
    const remembered = localStorage.getItem('rememberEmail');
    if (remembered) document.getElementById('loginEmail').value = remembered;
</script>
